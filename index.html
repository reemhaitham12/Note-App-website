<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <title>Note Website</title>
</head>

<body>

    <!-- note i build this design from image ( image in folder img) -->
     <!-- navbar + seacrh + orderBy -->
    <nav class="navbar navbar-expand-lg navbar-light bg-purple">
        <div class="container">
            <a class="navbar-brand text-white" href="#">Note App</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <form class="d-flex w-75 m-auto gap-2" role="search">
                    <input class="form-control ms-2" type="search" placeholder="Search" aria-label="Search">
                    <button class="btn btn-light search" type="submit">Search</button>
                </form>
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0b ">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle  text-white" href="#" role="button" data-bs-toggle="dropdown"
                            aria-expanded="false">
                            Sort By
                        </a>
                        <!-- show new to old or old to new -->
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Newest to Oldest</a></li>
                            <li><a class="dropdown-item" href="#">Oldest to Newest</a></li>

                        </ul>
                    </li>

                </ul>

            </div>
        </div>
    </nav>
    <!-- button add note -->
    <div class="addNote">
        <button type="button" class="btn rounded-circle  bg-purple" id="openCardBtn" `><i
                class="fa-solid fa-plus"></i></button>
    </div>
    <!-- overlay -->
    <div id="overlay" class="overlay hidden"></div>
    <!-- add note card -->
    <div id="noteCard" class="note-card hidden">
        <div class="card-header">
            <span>Add Note</span>
            <i id="closeCardBtn" class="fa-solid fa-xmark"></i>
        </div>

        <form id="noteForm">
            <input type="text" name="title" id="title" placeholder="Title...">
            <textarea name="body" id="body" placeholder="Note..."></textarea>
            <button type="button" class="btn bg-purple text-white w-100 mt-3 confirmSave">Save</button>
        </form>
    </div>
    <!-- confirm -->
    <div id="confirmCard" class="confirm-card hidden">
        <p class="fs-5">You have unsaved changes.<br>Do you want to save?</p>
        <div class="confirm-actions">
            <button class="btn bg-purple text-white confirmSave">Save</button>
            <button id="confirmDiscard" class="btn btn-danger">Discard</button>
        </div>
    </div>
    <!-- empty card if user donot enter title or body and click save -->
    <div id="emptyCard" class="empty-card hidden">
        <p>Please enter title and note before saving.</p>
        <button id="emptyOk" class="btn bg-purple text-white w-100">OK</button>
    </div>
    <!-- put image in background when not found note -->
     <div class="notFound">
        <img src="./img/brainNote.gif" alt="" srcset="">
        <p>Welcome to Notes</p>
     </div>














    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>
    <script src="./script.js"></script>

</body>

</html>
