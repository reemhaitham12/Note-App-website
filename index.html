<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Note App</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- FontAwesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Loading -->
<!-- <div id="loadingScreen" class="loading hidden">
<img src="./img/brainNote.gif">
<p>Loading...</p>
</div> -->

<!-- Navbar -->
<nav class="navbar navbar-expand-lg bg-purple">
<div class="container">

<a class="navbar-brand text-white">Note App</a>

<div class="collapse navbar-collapse">

<form class="d-flex w-75 m-auto gap-2">

<input id="searchInput" class="form-control" type="search" placeholder="Search notes">

</form>

</div>

</div>
</nav>


<!-- Add Note Button -->
<div class="addNote">

<button class="btn rounded-circle bg-purple" id="openCardBtn">

<i class="fa-solid fa-plus"></i>

</button>

</div>


<!-- Overlay -->
<div id="overlay" class="overlay hidden"></div>


<!-- Note Card -->
<div id="noteCard" class="note-card hidden">

<div class="card-header">

<span>Add Note</span>

<i id="closeCardBtn" class="fa-solid fa-xmark"></i>

</div>


<form id="noteForm">

<input id="title" type="text" placeholder="Title">

<textarea id="body" placeholder="Write your note..."></textarea>

<div class="color-picker-wrapper">

<i class="fa-solid fa-palette"></i>

<div id="colorPalette" class="color-palette">

<span class="color" data-color="#F29AAE" style="background:#dd9fae"></span>

<span class="color" data-color="#C47BE4" style="background:#ce9ce3"></span>

<span class="color" data-color="#7347fa" style="background:#ad98ec"></span>

<span class="color" data-color="#301CA0" style="background:#7869ce"></span>

</div>

</div>

<button type="button" class="btn bg-purple text-white w-100 mt-3 confirmSave">

Save

</button>

</form>

</div>


<!-- Confirm -->
<div id="confirmCard" class="confirm-card hidden">

<p>You have unsaved changes.<br>Save note?</p>

<div class="confirm-actions">

<button class="btn bg-purple text-white confirmSave">Save</button>

<button id="confirmDiscard" class="btn btn-danger">Discard</button>

</div>

</div>


<!-- Empty -->
<div id="emptyCard" class="empty-card hidden">

<p>Please enter title and note</p>

<button id="emptyOk" class="btn bg-purple text-white w-100">OK</button>

</div>


<!-- Not Found -->
<div class="notFound">

<img src="./img/brainNote.gif">

<p>Welcome to Notes</p>

</div>


<!-- Notes Container -->
<div class="container mt-5">

<div id="notesContainer" class="row g-3"></div>

</div>


<script src="script.js"></script>

</body>
</html>
